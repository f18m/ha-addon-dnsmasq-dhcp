#
# This pipeline is testing and building the addon for the Home Assistant
# and publishing its docker image to the GHCR registry
#
name: "Main CI"

on: 
  push:
    branches:
      - '**'
    tags:
      - '*'
  # add a cron job to run every month -- ensure there's a valid CI build every month
  # this is also useful to check if something breaks e.g. due to infrastructure changes (e.g. Ubuntu OS)
  # and there are no commits for a long time on the project
  schedule:
    - cron: '0 0 1 * *'

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: addon-dnsmasq-dhcp

permissions:
  contents: read

jobs:
  unit_tests:
    name: Golang Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Build golang code
        run: |
          cd backend
          go build -o uibackend main.go

      - name: Install test dependencies
        run: |
          sudo apt install -y dnsmasq

      - name: Run unit tests
        run: |
          cd backend
          go test -v ./...

  golangci:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # we need to pin the go-version because we also pin the golangci-lint version 
          # and we need to ensure compatibility between the two
          # IMPORTANT: this should be kept in sync with the version of the "golang" image
          # used in the build step of the Dockerfile 
          go-version: '1.26.2'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: backend
        
  check_tag:
    name: Check if Tag Build
    runs-on: ubuntu-latest
    outputs:
      is_tag: ${{ steps.check.outputs.is_tag }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
    - name: Check if it's a tagged release
      id: check
      run: |
        git_tag=${GITHUB_REF##*/}
        echo "GITHUB_REF is: ${GITHUB_REF}; git_tag is [${git_tag}]"
        if [[ -n "${GITHUB_REF##*refs/tags/*}" ]]; then
          echo "This looks like a non-TAG build"
          echo "is_tag=false" >> $GITHUB_ENV
          echo "is_tag=false" >> $GITHUB_OUTPUT
          echo "tag=" >> $GITHUB_OUTPUT
        else
          echo "This looks like a TAG build"
          echo "is_tag=true" >> $GITHUB_ENV
          echo "is_tag=true" >> $GITHUB_OUTPUT
          echo "tag=${git_tag}" >> $GITHUB_OUTPUT
        fi
    - run: |
        echo "This is a TAG build"
      if: ${{ steps.check.outputs.is_tag == 'true' }}
    - run: |
        echo "This is a non-TAG build"
      if: ${{ steps.check.outputs.is_tag == 'false' }}


    # -------------------------------------------------------------------------- #
    #                                  PUBLISH                                   #
    # -------------------------------------------------------------------------- #

  publish_init:
    name: Initialize build
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - check_tag
      - golangci
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Check coherency between tag and config.yaml
        run: |
          git_tag=${GITHUB_REF##*/}
          echo "Git tag is [${git_tag}]"

          # now get the version declared in config.yaml
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && \
            chmod +x /usr/bin/yq
          config_tag=$(yq .version ./myaddon/config.yaml)
          echo "Config YAML tag is [${config_tag}]"
          
          # compare
          if [[ "${git_tag}" != "${config_tag}" ]]; then
            echo "MISMATCH DETECTED between Git and config.yaml. Please remember to bump the version"
            echo "inside config.yaml before releasing a new tag."
            exit 123
          else
            echo "Git and config.yaml are coherent! Proceeding."
          fi
        if: ${{ needs.check_tag.outputs.is_tag == 'true' }}

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}


  publish_tagged_build:
    name: Build ${{ matrix.arch }} image
    needs:
      - publish_init
      - check_tag
    if: ${{ needs.check_tag.outputs.is_tag == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # To check out the code
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write # To push built images to GitHub Container Registry
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.publish_init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.check_tag.outputs.tag }}
            latest
          push: "true"
          version: ${{ needs.check_tag.outputs.tag }}


  publish_manifest:
    name: Publish multi-arch manifest
    needs:
      - publish_init
      - publish_tagged_build
      - check_tag
    if: ${{ needs.check_tag.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write # To push the manifest to GitHub Container Registry
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.check_tag.outputs.tag }}
            latest



    #   # -------------------------------------------------------------------------- #
    #   #                                 Job summary                                #
    #   # -------------------------------------------------------------------------- #

    #   - name: Emit Job Summary
    #     run: |
    #       echo "### Published Docker Image :rocket:" >> $GITHUB_STEP_SUMMARY
    #       echo '```' >> $GITHUB_STEP_SUMMARY
    #       echo "ghcr.io/f18m/${{ github.repository }}:${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
    #       echo '```' >> $GITHUB_STEP_SUMMARY
